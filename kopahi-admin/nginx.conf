server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — every unknown route serves index.html so react-router-dom can take over
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long cache on static assets (Vite emits hashed filenames)
  location ~* \.(?:js|css|svg|png|jpg|jpeg|webp|gif|ico|woff2?|ttf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }
}
